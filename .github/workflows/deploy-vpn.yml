# =============================================================
# deploy-vpn.yml — GitHub Actions CI/CD Pipeline
# Triggered: on every push to main branch
# =============================================================
# Required GitHub Secrets:
#   VPN_SERVER_IP   — SSH IP address of Ubuntu server, example: 192.168.56.102
#   VPN_SERVER_USER — SSH username, example: ubuntu
#   SSH_PRIVATE_KEY — Private key for SSH access
#   WG_PRIVATE_KEY  — WireGuard server private key
# =============================================================

name: Deploy WireGuard VPN

on:
  push:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  VPN_PORT: 51820
  VPN_TUNNEL_IP: "10.0.0.1"

defaults:
  run:
    shell: bash

jobs:

  validate:
    name: Validate Config & Scripts
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run config validation tests
        run: |
          echo "Running pre-deployment tests..."
          bash scripts/test_config.sh

      - name: Validation passed
        run: echo "All tests passed — proceeding to deployment"

  deploy:
    name: Deploy to VPN Server
    runs-on: self-hosted
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.VPN_SERVER_IP }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Prepare remote deployment folder
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} \
            "mkdir -p ~/vpn-deploy"

      - name: Copy scripts to server
        run: |
          scp -i ~/.ssh/deploy_key -r scripts/ \
            ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }}:~/vpn-deploy/

      - name: Install WireGuard on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} \
            "sudo bash ~/vpn-deploy/scripts/install_wireguard.sh"

      - name: Deploy WireGuard configuration
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} \
            "export WG_PRIVATE_KEY='${{ secrets.WG_PRIVATE_KEY }}' && \
             export VPN_SERVER_IP='${{ env.VPN_TUNNEL_IP }}' && \
             export VPN_PORT='${{ env.VPN_PORT }}' && \
             sudo -E bash ~/vpn-deploy/scripts/deploy_vpn.sh"

      - name: Verify VPN is running
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} \
            "sudo wg show wg0 && echo 'VPN is UP'"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  notify:
    name: Notify Result
    runs-on: self-hosted
    needs: [validate, deploy]
    if: always()

    steps:
      - name: Success notification
        if: ${{ needs.deploy.result == 'success' }}
        run: |
          echo "===================================="
          echo "VPN DEPLOYMENT SUCCESSFUL"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"
          echo "Time: $(date -u)"
          echo "===================================="

      - name: Failure notification
        if: ${{ needs.deploy.result == 'failure' || needs.validate.result == 'failure' }}
        run: |
          echo "===================================="
          echo "VPN DEPLOYMENT FAILED"
          echo "Commit: ${{ github.sha }}"
          echo "Check logs above for details"
          echo "===================================="
          exit 1