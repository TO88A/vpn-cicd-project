name: Deploy WireGuard VPN

on:
  push:
    branches:
      - main
    paths:
      - 'configs/**'
      - 'scripts/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  VPN_PORT: 51820
  VPN_TUNNEL_IP: "10.0.0.1"

jobs:

  validate:
    name: Validate Config & Scripts
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run config validation tests
        shell: powershell
        run: |
          Write-Host "Running pre-deployment tests..."
          & "C:\Program Files\Git\bin\bash.exe" scripts/test_config.sh

      - name: Validation passed
        shell: powershell
        run: Write-Host "All tests passed — proceeding to deployment"

  deploy:
    name: Deploy to VPN Server
    runs-on: self-hosted
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        shell: powershell
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"

          if (Test-Path $deployKey) {
            Remove-Item -Force $deployKey
          }

          $env:SSH_PRIVATE_KEY | Set-Content -Path $deployKey -NoNewline -Encoding ascii

          icacls $deployKey /inheritance:r
          icacls $deployKey /grant:r "$($env:USERNAME):R"

          Write-Host "SSH key created in runner temp folder"

      - name: Prepare remote deployment folder
        shell: powershell
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"
          ssh -o StrictHostKeyChecking=no -i $deployKey ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} "mkdir -p ~/vpn-deploy"

      - name: Copy scripts to server
        shell: powershell
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"
          scp -o StrictHostKeyChecking=no -i $deployKey -r scripts/ ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }}:~/vpn-deploy/

      - name: Install WireGuard on server
        shell: powershell
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"
          ssh -o StrictHostKeyChecking=no -i $deployKey ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} "sudo bash ~/vpn-deploy/scripts/install_wireguard.sh"

      - name: Deploy WireGuard configuration
        shell: powershell
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"
          ssh -o StrictHostKeyChecking=no -i $deployKey ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} "export WG_PRIVATE_KEY='${{ secrets.WG_PRIVATE_KEY }}' && export VPN_SERVER_IP='${{ env.VPN_TUNNEL_IP }}' && export VPN_PORT='${{ env.VPN_PORT }}' && sudo -E bash ~/vpn-deploy/scripts/deploy_vpn.sh"

      - name: Verify VPN is running
        shell: powershell
        run: |
          $deployKey = "$env:RUNNER_TEMP\deploy_key"
          ssh -o StrictHostKeyChecking=no -i $deployKey ${{ secrets.VPN_SERVER_USER }}@${{ secrets.VPN_SERVER_IP }} "sudo wg show wg0 && echo 'VPN is UP'"

      - name: Cleanup SSH key
        if: always()
        shell: powershell
        run: |
          Remove-Item -Force "$env:RUNNER_TEMP\deploy_key" -ErrorAction SilentlyContinue

  notify:
    name: Notify Result
    runs-on: self-hosted
    needs: [validate, deploy]
    if: always()

    steps:
      - name: Success notification
        if: ${{ needs.deploy.result == 'success' }}
        shell: powershell
        run: |
          Write-Host "===================================="
          Write-Host "VPN DEPLOYMENT SUCCESSFUL"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "By: ${{ github.actor }}"
          Write-Host "===================================="

      - name: Failure notification
        if: ${{ needs.deploy.result == 'failure' || needs.validate.result == 'failure' }}
        shell: powershell
        run: |
          Write-Host "===================================="
          Write-Host "VPN DEPLOYMENT FAILED"
          Write-Host "Commit: ${{ github.sha }}"
          Write-Host "Check logs above for details"
          Write-Host "===================================="
          exit 1